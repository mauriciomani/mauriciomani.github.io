<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 2rem; color: #333; background-color: #fafafa; }
        header { border-bottom: 2px solid #eaeaea; padding-bottom: 1rem; margin-bottom: 2rem; }
        header a { text-decoration: none; color: #222; font-weight: bold; font-size: 1.5rem; }
        nav { float: right; }
        nav a { margin-left: 1rem; text-decoration: none; color: #0066cc; }
        h1, h2, h3 { color: #111; }
        table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        footer { margin-top: 3rem; border-top: 1px solid #eaeaea; padding-top: 1rem; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <header>
        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav>
            <a href="{{ '/' | relative_url }}">Home</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. Built with GitHub Pages.</p>
    </footer>

</body>
</html>
